<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>풀리오 고객의 소리</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Pretendard",
          -apple-system,
          sans-serif;
        background: #f8f8f8;
        padding: 40px 16px;
      }
      .card {
        max-width: 520px;
        margin: 0 auto;
        background: #fff;
        border-radius: 16px;
        padding: 36px 32px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 6px;
        color: #111;
      }
      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 28px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 6px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-size: 14px;
        color: #111;
        transition: border-color 0.2s;
        outline: none;
        background: #fafafa;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: #3b82f6;
        background: #fff;
      }
      .field {
        margin-bottom: 18px;
      }
      textarea {
        resize: vertical;
        min-height: 100px;
      }
      .rating-wrap {
        display: flex;
        gap: 8px;
      }
      .rating-wrap button {
        flex: 1;
        padding: 8px 0;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        background: #fafafa;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.15s;
      }
      .rating-wrap button.active {
        background: #3b82f6;
        color: #fff;
        border-color: #3b82f6;
      }
      .submit-btn {
        width: 100%;
        padding: 14px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
      }
      .submit-btn:hover {
        background: #333;
      }
      .submit-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .success {
        display: none;
        text-align: center;
        padding: 32px 0;
      }
      .success .icon {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .success p {
        font-size: 16px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>🎙 고객의 소리</h2>
      <p class="subtitle">불편한 점, 칭찬, 개선 아이디어 모두 환영합니다</p>

      <form id="vocForm">
        <div class="field">
          <label>이름 *</label>
          <input type="text" name="name" placeholder="홍길동" required />
        </div>
        <div class="field">
          <label>이메일</label>
          <input type="email" name="email" placeholder="example@email.com" />
        </div>
        <div class="field">
          <label>관련 제품</label>
          <select name="product">
            <option value="">선택 안 함</option>
            <option>풀리오 미니</option>
            <option>풀리오 프로</option>
            <option>풀리오 넥</option>
            <option>기타</option>
          </select>
        </div>
        <div class="field">
          <label>문의 유형 *</label>
          <select name="category" required>
            <option value="">선택해주세요</option>
            <option>제품 결함</option>
            <option>배송 이슈</option>
            <option>사용법 문의</option>
            <option>환불·교환</option>
            <option>칭찬·제안</option>
            <option>기타</option>
          </select>
        </div>
        <div class="field">
          <label>만족도</label>
          <div class="rating-wrap" id="ratingWrap">
            <button type="button" data-v="1">😞 1</button>
            <button type="button" data-v="2">😕 2</button>
            <button type="button" data-v="3">😐 3</button>
            <button type="button" data-v="4">🙂 4</button>
            <button type="button" data-v="5">😊 5</button>
          </div>
          <input type="hidden" name="rating" id="ratingInput" />
        </div>
        <div class="field">
          <label>내용 *</label>
          <textarea
            name="message"
            placeholder="자세히 알려주실수록 빠르게 도움드릴 수 있어요."
            required
          ></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          접수하기
        </button>
      </form>

      <div class="success" id="successMsg">
        <div class="icon">✅</div>
        <p>소중한 의견 감사합니다!<br />빠르게 검토 후 연락드리겠습니다.</p>
      </div>
    </div>

    <script>
      // 평점 버튼
      document.querySelectorAll("#ratingWrap button").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("#ratingWrap button")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById("ratingInput").value = btn.dataset.v;
        });
      });

      document
        .getElementById("vocForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("submitBtn");
          btn.disabled = true;
          btn.textContent = "접수 중...";

          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData.entries());

          try {
            // 여기를 실제 서버 URL로 변경하세요
            const res = await fetch("https://your-server.com/api/voc", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ ...data, secret: "YOUR_VOC_SECRET" }),
            });

            if (!res.ok) throw new Error("서버 오류");

            document.getElementById("vocForm").style.display = "none";
            document.getElementById("successMsg").style.display = "block";
          } catch (err) {
            alert("접수 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
            btn.disabled = false;
            btn.textContent = "접수하기";
          }
        });
    </script>
  </body>
</html>
